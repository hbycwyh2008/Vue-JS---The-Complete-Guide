# 统一 Node 22 + 依赖安装，避免本机 Node 版本不一致导致报错。
# 使用：在项目根目录执行
#   docker compose up --build
# 浏览器打开 http://localhost:5173
#
# 若更新了 package-lock.json 后依赖异常，可重置数据卷后重试：
#   docker compose down -v && docker compose up --build
#
# 仅预览构建结果（静态站）：
#   docker compose --profile prod up web --build
# 浏览器打开 http://localhost:8080

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"

volumes:
  dev_node_modules:
